name: my_first_app
description: "工具箱 Pro — 多合一實用工具"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  sensors_plus: ^6.0.0
  mobile_scanner: ^6.0.0
  torch_light: ^1.0.0
  noise_meter: ^5.1.0
  shared_preferences: ^2.2.0
  qr_flutter: ^4.1.0
  audioplayers: ^6.1.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0
  http: ^1.2.0
  firebase_core: ^3.8.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.3.0
  share_plus: ^10.1.0
  in_app_review: ^2.0.11
  home_widget: ^0.9.0
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  in_app_purchase: ^3.2.0
  google_mobile_ads: ^5.1.0
  provider: ^6.1.0

dependency_overrides:
  audio_streamer:
    path: patches/audio_streamer

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0
  fake_async: ^1.3.1
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#6C5CE7"
  image: "assets/icon/app_icon.png"
  android_12:
    color: "#6C5CE7"
    image: "assets/icon/app_icon.png"
  web: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sounds/
    - assets/audio/
