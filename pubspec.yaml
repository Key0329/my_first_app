name: my_first_app
description: "工具箱 Pro — 多合一實用工具"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  sensors_plus: ^6.0.0
  mobile_scanner: ^6.0.0
  torch_light: ^1.0.0
  noise_meter: ^5.1.0
  http: ^1.1.0
  shared_preferences: ^2.2.0
  qr_flutter: ^4.1.0

dependency_overrides:
  audio_streamer:
    path: patches/audio_streamer

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  generate: true
